name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Android APK from HTML
        uses: tttstudios/html-to-apk-action@v1
        with:
          web-dir: 'www'
          app-name: 'MyTVApp'
          package-name: 'com.mybrand.app'

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: My-TV-App-APK
          path: app-release-unsigned.apk
